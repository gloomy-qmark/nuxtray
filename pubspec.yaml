name: nuxtray
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  device_apps: ^2.2.0

  cupertino_icons: ^1.0.8
  dynamic_color: ^1.8.1
  animations: ^2.2.0
  google_fonts: ^8.1.0
  device_info_plus: ^13.1.0
  crypto: ^3.0.7
  flutter_v2ray_plus: ^1.1.3
  http: ^1.6.0
  path_provider: ^2.1.5
  provider: ^6.1.1
  installed_apps: ^1.2.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"

  # adaptive_icon_background: "#000000" # Черный фон
  adaptive_icon_foreground: "assets/images/logo.png" # Ваш белый логотип на прозрачном фоне